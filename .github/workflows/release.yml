name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify-and-publish:
    name: Verify and publish GitHub Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use Xcode's swift (see ci.yml): OSS swift.org toolchains from setup-swift can crash in
      # GenericSpecializer on Pulse LoggerStore.initializeViewContext during release builds.
      - name: Toolchain info
        run: |
          xcodebuild -version
          which swift
          xcrun -f swift
          swift --version

      - name: Build (release)
        run: swift build -c release -v

      - name: Run tests
        run: swift test -v

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
